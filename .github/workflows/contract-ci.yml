name: Contract CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: stellar/actions/setup-rust@v1
        with:
          target: wasm32v1-none
      - run: make build
      - run: make test
      - run: make lint
